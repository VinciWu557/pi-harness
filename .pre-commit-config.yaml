repos:
    - repo: local
      hooks:
          - id: eslint
            name: eslint
            entry: npx eslint --fix
            language: system
            types_or: [javascript, jsx, ts, tsx]
          - id: prettier
            name: prettier
            entry: npx prettier --write
            language: system
            types_or: [javascript, jsx, ts, tsx, json, yaml, markdown]
          - id: typecheck
            name: npm typecheck
            entry: npm run typecheck
            language: system
            pass_filenames: false
