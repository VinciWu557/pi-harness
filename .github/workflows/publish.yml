name: Publish

on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

concurrency:
  group: publish-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish packages to npm
    runs-on: ubuntu-latest

    steps:
      - name: Checkout tag
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify packages
        run: npm run check

      - name: Publish unpublished workspace packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail

          node - <<'NODE' > /tmp/pi-workspaces.tsv
          const fs = require("node:fs");
          const path = require("node:path");

          const workspaceDirs = ["extensions", "skills"];
          for (const dir of workspaceDirs) {
            if (!fs.existsSync(dir)) continue;
            for (const dirent of fs.readdirSync(dir, { withFileTypes: true })) {
              if (!dirent.isDirectory()) continue;

              const packageJsonPath = path.join(dir, dirent.name, "package.json");
              if (!fs.existsSync(packageJsonPath)) continue;

              const packageJson = JSON.parse(fs.readFileSync(packageJsonPath, "utf8"));
              if (packageJson.private) continue;

              console.log(`${packageJson.name}\t${packageJson.version}`);
            }
          }
          NODE

          while IFS=$'\t' read -r package version; do
            if [ -z "$package" ] || [ -z "$version" ]; then
              continue
            fi

            if npm view "${package}@${version}" version >/dev/null 2>&1; then
              echo "${package}@${version} already exists; skipping publish."
              continue
            fi

            echo "Publishing ${package}@${version}..."
            npm --workspace "$package" publish --access public --loglevel verbose
          done < /tmp/pi-workspaces.tsv
